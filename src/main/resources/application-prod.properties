# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/explora_map
spring.datasource.username=explora_user
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate para PostGIS
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Produci�n
logging.level.org.springframework=ERROR
spring.jpa.hibernate.ddl-auto=validate

# Mail configuration (prod: configure via environment variables)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.base-url=${APP_BASE_URL}
app.verificacion.expiracion-horas=24
