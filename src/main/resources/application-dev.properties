# ============================================================
# Explora Map ? Sprint 1 configuration
# ============================================================

server.port=8080

# ---- H2 en memoria ----
spring.datasource.url=jdbc:h2:mem:exploradb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 accesible en http://localhost:8080/h2-console (s� en dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
# IMPORTANTE: en produci�n esta clave debe ir nunha variable de entorno,
# nunca hardcoded. M�nimo 256 bits (32 chars) para HS256.
jwt.secret=ExploraMapSecretKey2025_MustBe32CharsMinimumForHS256Security!
# 15 minutos en milisegundos (900000 = 15 * 60 * 1000)
jwt.access.expiracion=900000

# Expiraci�n do refresh token en d�as
jwt.refresh.expiration.days=7

# ---- CORS ? permite o frontend React en localhost:5173 (Vite) ----
cors.allowed.origins=http://localhost:5173,http://localhost:3000

# ---- Logs ----
logging.level.explora.map=DEBUG
logging.level.org.springframework.security=INFO